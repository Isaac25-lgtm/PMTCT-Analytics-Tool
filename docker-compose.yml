version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pmtct-app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      LOG_LEVEL: DEBUG
      LOG_FORMAT: console
      DHIS2_BASE_URL: ${DHIS2_BASE_URL:-https://hmis.health.go.ug}
      SESSION_TIMEOUT_MINUTES: 120
      CACHE_ENABLED: "true"
      CACHE_MAX_SIZE: 5000
      RATE_LIMIT_ENABLED: "false"
      CSRF_ENABLED: "false"
      AUDIT_ENABLED: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./static:/app/static
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
