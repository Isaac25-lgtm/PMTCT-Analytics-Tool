name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-export.txt
          pip install ruff mypy

      - name: Ruff
        run: ruff check app tests

      - name: Mypy
        run: mypy app --ignore-missing-imports
        continue-on-error: true

      - name: Validate config files
        run: python scripts/validate_config.py --verbose

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-export.txt

      - name: Run unit tests
        env:
          APP_ENV: test
          LOG_LEVEL: WARNING
          LOG_FORMAT: console
        run: pytest tests/unit --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-export.txt

      - name: Run API tests
        env:
          APP_ENV: test
          LOG_LEVEL: WARNING
          LOG_FORMAT: console
          CACHE_ENABLED: "true"
          RATE_LIMIT_ENABLED: "false"
          CSRF_ENABLED: "false"
        run: pytest tests/api -v --tb=short

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-export.txt

      - name: Run integration tests
        env:
          APP_ENV: test
          LOG_LEVEL: WARNING
          LOG_FORMAT: console
          CACHE_ENABLED: "true"
          RATE_LIMIT_ENABLED: "false"
          CSRF_ENABLED: "false"
        run: pytest tests/integration -v --tb=short -m integration -o addopts=""

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pmtct-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name pmtct-smoke \
            -e APP_ENV=test \
            -e LOG_LEVEL=WARNING \
            -e LOG_FORMAT=console \
            -e SECRET_KEY=test-secret-key \
            -e DHIS2_BASE_URL=https://play.dhis2.org/40.4.0 \
            -p 8000:8000 \
            pmtct-app:test

          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/health/ready; then
              docker stop pmtct-smoke
              exit 0
            fi
            sleep 3
          done

          docker logs pmtct-smoke || true
          docker stop pmtct-smoke || true
          exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit
        run: bandit -r app -ll -ii
        continue-on-error: true

      - name: Dependency audit
        run: pip-audit -r requirements.txt -r requirements-export.txt
        continue-on-error: true
