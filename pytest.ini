[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: unit tests with no live external dependencies
    api: route and request tests using FastAPI TestClient
    integration: tests that require a live DHIS2 instance
    slow: slower tests that can be excluded from quick runs

asyncio_mode = auto
addopts =
    -v
    --tb=short
    -m "not integration"
log_cli = true
log_cli_level = WARNING
